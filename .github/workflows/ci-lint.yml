name: Lint and Type Check

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with lint extras
        run: python -m pip install -e "src/backend[lint]"

      - name: Ruff (backend)
        run: >-
          python -m ruff check
          --config src/backend/pyproject.toml
          src/backend

      - name: mypy (registration-only, strict, shallow)
        run: >-
          python -m mypy --strict --config-file src/backend/mypy.ini
          --follow-imports=skip
          -p plume_nav_sim.registration
