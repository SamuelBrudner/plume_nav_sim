name: Lint and Type Check

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with lint, test, and hydra extras
        run: python -m pip install -e "src/backend[lint,test,hydra]"

      - name: Ruff (backend)
        run: >-
          python -m ruff check
          --config src/backend/pyproject.toml
          src/backend

      - name: mypy (registration + config adapters)
        run: >-
          cd src/backend && python -m mypy
          --config-file mypy.ini
          -m plume_nav_sim.registration
          -m plume_nav_sim.config.defaults
          -m plume_nav_sim.config.factories

      - name: Construction guardrails
        run: >-
          python -m pytest --tb=short -q
          src/backend/tests/unit/config/test_public_config_surface.py
          src/backend/tests/unit/config/test_composition.py
          src/backend/tests/unit/config/test_config_examples.py
          src/backend/tests/cli/test_capture_hydra_helpers.py
          src/backend/tests/plume_nav_sim/envs/test_plume_env.py
          tests/test_repo_hygiene_references.py
