[tox]
minversion = 4.6
env_list = py310,py311,py312,py313,test,lint,type
skip_missing_interpreters = true

[testenv]
description = Run the backend test suite
package = editable
extras = test
setenv =
    MPLBACKEND = Agg
commands =
    python -m pytest {posargs:tests/} --tb=short -q

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:test]
description = Run the backend test suite explicitly

[testenv:lint]
description = Run the canonical Ruff lint pass
extras = lint
commands =
    python -m ruff check .

[testenv:type]
description = Run the narrow mypy check used in CI
extras = lint
commands =
    python -m mypy --strict --config-file mypy.ini --follow-imports=skip -p plume_nav_sim.registration
